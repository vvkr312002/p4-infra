# SecureChat NGINX Configuration
# Place at: /etc/nginx/sites-available/securechat
# Enable: sudo ln -s /etc/nginx/sites-available/securechat /etc/nginx/sites-enabled/
# TLS:    sudo certbot --nginx -d example.com   (replace example.com with real domain)

# ── Upstream: Node.js Express/WS server ──────────────────────────────────────
upstream securechat_backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;  # TODO: replace with your domain

    # Allow Let's Encrypt ACME challenge through
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS + WebSocket ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.com www.example.com;  # TODO: replace with your domain

    # TLS certificates (populated by: sudo certbot --nginx -d example.com)
    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            DENY                                           always;
    add_header X-Content-Type-Options     nosniff                                        always;
    add_header X-XSS-Protection           "1; mode=block"                                always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"              always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self'; connect-src 'self' wss://example.com;" always;

    # Gzip
    gzip            on;
    gzip_vary       on;
    gzip_types      text/plain text/css application/json application/javascript;

    # Logging — streamed to CloudWatch by the agent
    access_log  /var/log/nginx/securechat-access.log  combined;
    error_log   /var/log/nginx/securechat-error.log   warn;

    # ── React SPA (static build) ──────────────────────────────────────────────
    root  /opt/securechat/frontend/build;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── REST API ──────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://securechat_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # ── WebSocket ─────────────────────────────────────────────────────────────
    # wss://example.com/ws → ws://127.0.0.1:3000/ws
    location /ws {
        proxy_pass         http://securechat_backend;
        proxy_http_version 1.1;

        # Required WebSocket upgrade headers
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;

        # Keep WS connections alive for up to 1 hour
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout 10s;
    }

    # Block access to hidden files and dot-files
    location ~ /\. {
        deny all;
    }
}
